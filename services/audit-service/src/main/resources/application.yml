spring:
  application:
    name: audit-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://ondeedu:ondeedu_mongo@localhost:27017/audit_db?authSource=admin}
      auto-index-creation: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:ondeedu}
    password: ${RABBITMQ_PASS:ondeedu_rabbit}
    virtual-host: ${RABBITMQ_VHOST:ondeedu}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/auth/realms/ondeedu}

server:
  port: 8130

grpc:
  server:
    port: -1   # disable gRPC — audit-service is REST-only

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.ondeedu.audit: DEBUG
