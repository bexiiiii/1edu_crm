server:
  port: 8100

grpc:
  server:
    port: 9100

spring:
  application:
    name: tenant-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ondeedu_crm
    username: ondeedu
    password: ondeedu_secret
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: system
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: system
    default-schema: system
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/ondeedu

ondeedu:
  multitenancy:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 0.1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

services:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8101}

tenant:
  registration:
    welcome-email:
      base-domain: ${BASE_DOMAIN:${DOMAIN:1edu.kz}}
      scheme: ${TENANT_PUBLIC_SCHEME:https}
  subscription:
    notifications:
      enabled: ${TENANT_SUBSCRIPTION_NOTIFICATIONS_ENABLED:true}
      cron: ${TENANT_SUBSCRIPTION_NOTIFICATIONS_CRON:0 0 * * * *}
      zone: ${TENANT_SUBSCRIPTION_NOTIFICATIONS_ZONE:UTC}

logging:
  level:
    com.ondeedu: INFO
