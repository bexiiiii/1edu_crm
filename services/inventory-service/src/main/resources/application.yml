server:
  port: 8132
  grpc-port: 9132

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://pgbouncer:5432/${DB_NAME:1edu_crm}
    username: ${DB_USER:ondeedu}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${flyway.schema:system}
    default-schema: ${flyway.schema:system}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:false}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        multiTenancy: SCHEMA
        multi_tenant_identifier_resolver: com.ondeedu.common.tenant.TenantIdentifierResolver
        tenant_connection_provider: com.ondeedu.common.tenant.TenantSchemaConnectionProvider

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://service-registry:8761/eureka}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9132}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.acquire: true

logging:
  level:
    com.ondeedu: INFO
    org.hibernate.SQL: WARN
