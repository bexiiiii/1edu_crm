server:
  port: 8116

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ondeedu_crm
    username: ondeedu
    password: ondeedu_secret
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: system
  rabbitmq:
    host: localhost
    port: 5672
    username: ondeedu
    password: ondeedu_rabbit
    virtual-host: ondeedu
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@ondeedu.com}
    password: ${MAIL_PASSWORD:changeme}
    from: ${MAIL_FROM:noreply@ondeedu.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ondeedu

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    mail:
      enabled: false
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ondeedu: DEBUG
