server:
  port: 8116

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ondeedu_crm
    username: ondeedu
    password: ondeedu_secret
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: system
  rabbitmq:
    host: localhost
    port: 5672
    username: ondeedu
    password: ondeedu_rabbit
    virtual-host: ondeedu
    listener:
      simple:
        concurrency: 10
        max-concurrency: 20
        prefetch: 30
  mail:
    host: ${SMTP_HOST:${MAIL_HOST:smtp-relay.brevo.com}}
    port: ${SMTP_PORT:${MAIL_PORT:587}}
    username: ${SMTP_USERNAME:${MAIL_USERNAME:}}
    password: ${SMTP_PASSWORD:${MAIL_PASSWORD:}}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SMTP_TIMEOUT:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/ondeedu

notification:
  mail:
    from: ${MAIL_FROM:${SMTP_FROM:}}
    reply-to: ${MAIL_REPLY_TO:}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    mail:
      enabled: false
  tracing:
    sampling:
      probability: 0.1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ondeedu: INFO
