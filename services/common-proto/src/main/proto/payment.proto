syntax = "proto3";

package com.ondeedu.grpc.payment;

option java_multiple_files = true;
option java_package = "com.ondeedu.grpc.payment";
option java_outer_classname = "PaymentProto";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service PaymentService {
  // Payment operations
  rpc CreatePayment(CreatePaymentRequest) returns (PaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (PaymentResponse);
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);
  rpc GetPaymentsByStudent(GetPaymentsByStudentRequest) returns (ListPaymentsResponse);
  rpc EnsureCourseSubscription(EnsureCourseSubscriptionRequest) returns (PaymentResponse);
  rpc CancelCourseSubscription(CancelCourseSubscriptionRequest) returns (PaymentResponse);

  // Payment processing
  rpc ProcessPayment(ProcessPaymentRequest) returns (PaymentResponse);
  rpc RefundPayment(RefundPaymentRequest) returns (PaymentResponse);
  rpc CancelPayment(CancelPaymentRequest) returns (PaymentResponse);

  // Invoice operations
  rpc CreateInvoice(CreateInvoiceRequest) returns (InvoiceResponse);
  rpc GetInvoice(GetInvoiceRequest) returns (InvoiceResponse);
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
  rpc GetStudentBalance(GetStudentBalanceRequest) returns (StudentBalanceResponse);

  // Reports
  rpc GetPaymentStats(GetPaymentStatsRequest) returns (PaymentStatsResponse);
  rpc GetRevenueReport(GetRevenueReportRequest) returns (RevenueReportResponse);
}

message Payment {
  string id = 1;
  string student_id = 2;
  string invoice_id = 3;
  com.ondeedu.grpc.common.Money amount = 4;
  string payment_method = 5;  // CASH, CARD, BANK_TRANSFER, KASPI, HALYK
  string status = 6;  // PENDING, COMPLETED, FAILED, REFUNDED, CANCELLED
  google.protobuf.StringValue transaction_id = 7;
  google.protobuf.StringValue receipt_number = 8;
  google.protobuf.StringValue notes = 9;
  google.protobuf.Timestamp payment_date = 10;
  string created_by = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message Invoice {
  string id = 1;
  string invoice_number = 2;
  string student_id = 3;
  google.protobuf.StringValue group_id = 4;
  com.ondeedu.grpc.common.Money total_amount = 5;
  com.ondeedu.grpc.common.Money paid_amount = 6;
  com.ondeedu.grpc.common.Money discount = 7;
  string status = 8;  // DRAFT, PENDING, PARTIAL, PAID, OVERDUE, CANCELLED
  google.protobuf.Timestamp due_date = 9;
  repeated InvoiceItem items = 10;
  google.protobuf.StringValue notes = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message InvoiceItem {
  string description = 1;
  int32 quantity = 2;
  com.ondeedu.grpc.common.Money unit_price = 3;
  com.ondeedu.grpc.common.Money total = 4;
}

// Payment requests
message CreatePaymentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  google.protobuf.StringValue invoice_id = 3;
  com.ondeedu.grpc.common.Money amount = 4;
  string payment_method = 5;
  google.protobuf.StringValue notes = 6;
}

message GetPaymentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string payment_id = 2;
}

message ListPaymentsRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.PageRequest page = 2;
  google.protobuf.StringValue status = 3;
  google.protobuf.StringValue payment_method = 4;
  com.ondeedu.grpc.common.DateRange date_range = 5;
}

message GetPaymentsByStudentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  com.ondeedu.grpc.common.PageRequest page = 3;
}

message EnsureCourseSubscriptionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  string course_id = 3;
  string course_name = 4;
  com.ondeedu.grpc.common.Money amount = 5;
}

message CancelCourseSubscriptionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  string course_id = 3;
}

message ProcessPaymentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string payment_id = 2;
  google.protobuf.StringValue transaction_id = 3;
}

message RefundPaymentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string payment_id = 2;
  com.ondeedu.grpc.common.Money amount = 3;
  string reason = 4;
}

message CancelPaymentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string payment_id = 2;
  string reason = 3;
}

// Invoice requests
message CreateInvoiceRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  google.protobuf.StringValue group_id = 3;
  repeated InvoiceItem items = 4;
  com.ondeedu.grpc.common.Money discount = 5;
  google.protobuf.Timestamp due_date = 6;
  google.protobuf.StringValue notes = 7;
}

message GetInvoiceRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string invoice_id = 2;
}

message ListInvoicesRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.PageRequest page = 2;
  google.protobuf.StringValue status = 3;
  google.protobuf.StringValue student_id = 4;
}

message GetStudentBalanceRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
}

message GetPaymentStatsRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.DateRange date_range = 2;
}

message GetRevenueReportRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.DateRange date_range = 2;
  string group_by = 3;  // DAY, WEEK, MONTH
}

// Responses
message PaymentResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  Payment payment = 3;
}

message ListPaymentsResponse {
  bool success = 1;
  repeated Payment payments = 2;
  com.ondeedu.grpc.common.PageInfo page_info = 3;
}

message InvoiceResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  Invoice invoice = 3;
}

message ListInvoicesResponse {
  bool success = 1;
  repeated Invoice invoices = 2;
  com.ondeedu.grpc.common.PageInfo page_info = 3;
}

message StudentBalanceResponse {
  string student_id = 1;
  com.ondeedu.grpc.common.Money total_invoiced = 2;
  com.ondeedu.grpc.common.Money total_paid = 3;
  com.ondeedu.grpc.common.Money balance = 4;
  int32 overdue_invoices = 5;
}

message PaymentStatsResponse {
  com.ondeedu.grpc.common.Money total_revenue = 1;
  int64 total_payments = 2;
  com.ondeedu.grpc.common.Money average_payment = 3;
  map<string, int64> by_method = 4;
}

message RevenueReportResponse {
  repeated RevenuePeriod periods = 1;
  com.ondeedu.grpc.common.Money total = 2;
}

message RevenuePeriod {
  string period = 1;
  com.ondeedu.grpc.common.Money amount = 2;
  int64 payment_count = 3;
}
