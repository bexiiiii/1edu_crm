syntax = "proto3";

package com.ondeedu.grpc.finance;

option java_multiple_files = true;
option java_package = "com.ondeedu.grpc.finance";
option java_outer_classname = "FinanceProto";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service FinanceService {
  rpc CreateTransaction(CreateTransactionRequest) returns (TransactionResponse);
  rpc GetTransaction(GetTransactionRequest) returns (TransactionResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (TransactionResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (com.ondeedu.grpc.common.ApiResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);

  // Queries
  rpc ListTransactionsByStudent(ListTransactionsByStudentRequest) returns (ListTransactionsResponse);
  rpc ListTransactionsByDateRange(ListTransactionsByDateRangeRequest) returns (ListTransactionsResponse);
}

message Transaction {
  string id = 1;
  string type = 2;    // INCOME, EXPENSE, REFUND
  string status = 3;  // PENDING, COMPLETED, CANCELLED
  com.ondeedu.grpc.common.Money amount = 4;
  google.protobuf.StringValue category = 5;
  google.protobuf.StringValue description = 6;
  google.protobuf.Timestamp transaction_date = 7;
  google.protobuf.StringValue student_id = 8;
  google.protobuf.StringValue notes = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateTransactionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string type = 2;
  com.ondeedu.grpc.common.Money amount = 3;
  google.protobuf.StringValue category = 4;
  google.protobuf.StringValue description = 5;
  google.protobuf.Timestamp transaction_date = 6;
  google.protobuf.StringValue student_id = 7;
  google.protobuf.StringValue notes = 8;
}

message GetTransactionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string transaction_id = 2;
}

message UpdateTransactionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string transaction_id = 2;
  google.protobuf.StringValue type = 3;
  google.protobuf.StringValue status = 4;
  com.ondeedu.grpc.common.Money amount = 5;
  google.protobuf.StringValue category = 6;
  google.protobuf.StringValue description = 7;
  google.protobuf.Timestamp transaction_date = 8;
  google.protobuf.StringValue student_id = 9;
  google.protobuf.StringValue notes = 10;
}

message DeleteTransactionRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string transaction_id = 2;
}

message ListTransactionsRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.PageRequest page = 2;
  google.protobuf.StringValue type = 3;
  google.protobuf.StringValue status = 4;
}

message ListTransactionsByStudentRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string student_id = 2;
  com.ondeedu.grpc.common.PageRequest page = 3;
}

message ListTransactionsByDateRangeRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.DateRange date_range = 2;
  com.ondeedu.grpc.common.PageRequest page = 3;
}

message TransactionResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  Transaction transaction = 3;
}

message ListTransactionsResponse {
  bool success = 1;
  repeated Transaction transactions = 2;
  com.ondeedu.grpc.common.PageInfo page_info = 3;
}
