syntax = "proto3";

package com.ondeedu.grpc.settings;

option java_multiple_files = true;
option java_package = "com.ondeedu.grpc.settings";
option java_outer_classname = "SettingsProto";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (SettingsResponse);
  rpc UpdateSettings(UpdateSettingsRequest) returns (SettingsResponse);
  rpc GetKpayConfig(GetKpayConfigRequest) returns (KpayConfigResponse);
  rpc GetApiPayConfig(GetApiPayConfigRequest) returns (ApiPayConfigResponse);
  rpc GetAisarConfig(GetAisarConfigRequest) returns (AisarConfigResponse);
  rpc GetFtelecomConfig(GetFtelecomConfigRequest) returns (FtelecomConfigResponse);
  rpc GetZadarmaConfig(GetZadarmaConfigRequest) returns (ZadarmaConfigResponse);
}

message Settings {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue center_name = 2;
  google.protobuf.StringValue main_direction = 3;
  google.protobuf.StringValue director_name = 4;
  google.protobuf.StringValue corporate_email = 5;
  google.protobuf.StringValue city = 6;
  google.protobuf.StringValue work_phone = 7;
  google.protobuf.StringValue address = 8;
  google.protobuf.StringValue timezone = 9;
  google.protobuf.StringValue currency = 10;
  google.protobuf.StringValue language = 11;
  google.protobuf.StringValue working_hours_start = 12;
  google.protobuf.StringValue working_hours_end = 13;
  google.protobuf.Int32Value default_lesson_duration_min = 14;
  google.protobuf.Int32Value trial_lesson_duration_min = 15;
  google.protobuf.Int32Value max_group_size = 16;
  bool auto_mark_attendance = 17;
  google.protobuf.Int32Value attendance_window_days = 18;
  bool sms_enabled = 19;
  bool email_enabled = 20;
  google.protobuf.StringValue sms_sender_name = 21;
  google.protobuf.Int32Value late_payment_reminder_days = 22;
  google.protobuf.Int32Value subscription_expiry_reminder_days = 23;
  google.protobuf.StringValue brand_color = 24;
  google.protobuf.Timestamp created_at = 25;
  google.protobuf.Timestamp updated_at = 26;
}

message GetSettingsRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message UpdateSettingsRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  google.protobuf.StringValue center_name = 2;
  google.protobuf.StringValue main_direction = 3;
  google.protobuf.StringValue director_name = 4;
  google.protobuf.StringValue corporate_email = 5;
  google.protobuf.StringValue city = 6;
  google.protobuf.StringValue work_phone = 7;
  google.protobuf.StringValue address = 8;
  google.protobuf.StringValue timezone = 9;
  google.protobuf.StringValue currency = 10;
  google.protobuf.StringValue language = 11;
  google.protobuf.StringValue working_hours_start = 12;
  google.protobuf.StringValue working_hours_end = 13;
  google.protobuf.Int32Value default_lesson_duration_min = 14;
  google.protobuf.Int32Value trial_lesson_duration_min = 15;
  google.protobuf.Int32Value max_group_size = 16;
  google.protobuf.BoolValue auto_mark_attendance = 17;
  google.protobuf.Int32Value attendance_window_days = 18;
  google.protobuf.BoolValue sms_enabled = 19;
  google.protobuf.BoolValue email_enabled = 20;
  google.protobuf.StringValue sms_sender_name = 21;
  google.protobuf.Int32Value late_payment_reminder_days = 22;
  google.protobuf.Int32Value subscription_expiry_reminder_days = 23;
  google.protobuf.StringValue brand_color = 24;
}

message SettingsResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  Settings settings = 3;
}

message KpayConfig {
  bool enabled = 1;
  bool configured = 2;
  google.protobuf.StringValue merchant_id = 3;
  google.protobuf.StringValue api_base_url = 4;
  google.protobuf.StringValue recipient_field = 5;
  google.protobuf.StringValue api_key = 6;
  google.protobuf.StringValue api_secret = 7;
}

message GetKpayConfigRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message KpayConfigResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  KpayConfig config = 3;
}

message ApiPayConfig {
  bool enabled = 1;
  bool configured = 2;
  google.protobuf.StringValue api_base_url = 3;
  google.protobuf.StringValue recipient_field = 4;
  google.protobuf.StringValue api_key = 5;
  google.protobuf.StringValue webhook_secret = 6;
}

message GetApiPayConfigRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message ApiPayConfigResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  ApiPayConfig config = 3;
}

message AisarConfig {
  bool enabled = 1;
  bool configured = 2;
  google.protobuf.StringValue api_base_url = 3;
  google.protobuf.StringValue api_key = 4;
  google.protobuf.StringValue webhook_secret = 5;
}

message GetAisarConfigRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message AisarConfigResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  AisarConfig config = 3;
}

message FtelecomConfig {
  bool enabled = 1;
  bool configured = 2;
  google.protobuf.StringValue api_base_url = 3;
  google.protobuf.StringValue crm_token = 4;
}

message GetFtelecomConfigRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message FtelecomConfigResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  FtelecomConfig config = 3;
}

message ZadarmaConfig {
  bool enabled = 1;
  bool configured = 2;
  google.protobuf.StringValue api_base_url = 3;
  google.protobuf.StringValue user_key = 4;
  google.protobuf.StringValue user_secret = 5;
}

message GetZadarmaConfigRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
}

message ZadarmaConfigResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  ZadarmaConfig config = 3;
}
