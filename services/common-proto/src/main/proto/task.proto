syntax = "proto3";

package com.ondeedu.grpc.task;

option java_multiple_files = true;
option java_package = "com.ondeedu.grpc.task";
option java_outer_classname = "TaskProto";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (TaskResponse);
  rpc GetTask(GetTaskRequest) returns (TaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (TaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (com.ondeedu.grpc.common.ApiResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc SearchTasks(SearchTasksRequest) returns (ListTasksResponse);

  // Task-specific
  rpc ListTasksByAssignee(ListTasksByAssigneeRequest) returns (ListTasksResponse);
  rpc ListOverdueTasks(ListOverdueTasksRequest) returns (ListTasksResponse);
}

message Task {
  string id = 1;
  string title = 2;
  google.protobuf.StringValue description = 3;
  string status = 4;    // TODO, IN_PROGRESS, DONE, CANCELLED
  string priority = 5;  // LOW, MEDIUM, HIGH, URGENT
  google.protobuf.StringValue assigned_to = 6;
  google.protobuf.Timestamp due_date = 7;
  google.protobuf.StringValue notes = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateTaskRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string title = 2;
  google.protobuf.StringValue description = 3;
  google.protobuf.StringValue priority = 4;
  google.protobuf.StringValue assigned_to = 5;
  google.protobuf.Timestamp due_date = 6;
  google.protobuf.StringValue notes = 7;
}

message GetTaskRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string task_id = 2;
}

message UpdateTaskRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string task_id = 2;
  google.protobuf.StringValue title = 3;
  google.protobuf.StringValue description = 4;
  google.protobuf.StringValue status = 5;
  google.protobuf.StringValue priority = 6;
  google.protobuf.StringValue assigned_to = 7;
  google.protobuf.Timestamp due_date = 8;
  google.protobuf.StringValue notes = 9;
}

message DeleteTaskRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string task_id = 2;
}

message ListTasksRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.PageRequest page = 2;
  google.protobuf.StringValue status = 3;
  google.protobuf.StringValue priority = 4;
}

message SearchTasksRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string query = 2;
  com.ondeedu.grpc.common.PageRequest page = 3;
}

message ListTasksByAssigneeRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  string assigned_to = 2;
  google.protobuf.StringValue status = 3;
  com.ondeedu.grpc.common.PageRequest page = 4;
}

message ListOverdueTasksRequest {
  com.ondeedu.grpc.common.TenantContext context = 1;
  com.ondeedu.grpc.common.PageRequest page = 2;
}

message TaskResponse {
  bool success = 1;
  google.protobuf.StringValue message = 2;
  Task task = 3;
}

message ListTasksResponse {
  bool success = 1;
  repeated Task tasks = 2;
  com.ondeedu.grpc.common.PageInfo page_info = 3;
}
