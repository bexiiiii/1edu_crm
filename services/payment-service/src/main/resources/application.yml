server:
  port: 8110

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ondeedu_crm
    username: ondeedu
    password: ondeedu_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        multiTenancy: SCHEMA
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: system
  data:
    redis:
      host: localhost
      port: 6379
      password: ondeedu_redis
  rabbitmq:
    host: localhost
    port: 5672
    username: ondeedu
    password: ondeedu_rabbit
    virtual-host: ondeedu
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 20
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/ondeedu

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

grpc:
  server:
    port: 9110
  client:
    GLOBAL:
      negotiation-type: plaintext
    student-service:
      address: static://localhost:9102
    settings-service:
      address: static://localhost:9128

payment:
  kpay:
    billing:
      enabled: true
      cron: ${KPAY_BILLING_CRON:0 0 20 28-31 * *}
  apipay:
    billing:
      enabled: true
      cron: ${APIPAY_BILLING_CRON:0 15 20 28-31 * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ondeedu: INFO
    org.hibernate.SQL: WARN
