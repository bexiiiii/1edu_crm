  # ══════════════════════════════════════════════════════════
  # NGINX REVERSE PROXY (routes external traffic → api-gateway)
  # ══════════════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: 1edu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/tenants:/etc/nginx/tenants:ro
      - ./infrastructure/certbot/conf:/etc/letsencrypt:ro
      - ./infrastructure/certbot/www:/var/www/certbot:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks: [1edu-network]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  certbot:
    image: certbot/certbot
    container_name: 1edu-certbot
    volumes:
      - ./infrastructure/certbot/conf:/etc/letsencrypt
      - ./infrastructure/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks: [1edu-network]

  # ── Cert Issuer — per-tenant SSL automation ───────────────────
  cert-issuer:
    build:
      context: ./infrastructure/cert-issuer
      dockerfile: Dockerfile
    container_name: 1edu-cert-issuer
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      BASE_DOMAIN: ${DOMAIN:-1edu.kz}
      CERT_EMAIL: ${CERT_EMAIL:-admin@1edu.kz}
      NGINX_CONTAINER: 1edu-nginx
      WEBROOT: /var/www/certbot
      NGINX_TENANTS_DIR: /etc/nginx/tenants
      LETSENCRYPT_DIR: /etc/letsencrypt
    volumes:
      - ./infrastructure/certbot/conf:/etc/letsencrypt
      - ./infrastructure/certbot/www:/var/www/certbot
      - ./infrastructure/nginx/tenants:/etc/nginx/tenants
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx
    networks: [1edu-network]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  elasticsearch_data:
    driver: local
  mongodb_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ─── Network ─────────────────────────────────────────────────
networks:
  1edu-network:
    external: true
    name: 1edu_1edu-network
