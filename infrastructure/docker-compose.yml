services:
  # PostgreSQL - Primary Database (Multi-tenant)
  postgres:
    image: postgres:16-alpine
    container_name: 1edu-postgres
    environment:
      POSTGRES_USER: ondeedu
      POSTGRES_PASSWORD: ondeedu_secret
      POSTGRES_DB: ondeedu_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ondeedu -d ondeedu_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: 1edu-redis
    command: redis-server --appendonly yes --requirepass ondeedu_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ondeedu_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: 1edu-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ondeedu
      RABBITMQ_DEFAULT_PASS: ondeedu_rabbit
      RABBITMQ_DEFAULT_VHOST: ondeedu
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - Full-text Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: 1edu-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=1edu-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana - Elasticsearch UI (optional, for development)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: 1edu-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - 1edu-network

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: 1edu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ondeedu_minio
      MINIO_ROOT_PASSWORD: ondeedu_minio_secret
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Keycloak - Identity & Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: 1edu-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ondeedu_crm
      KC_DB_USERNAME: ondeedu
      KC_DB_PASSWORD: ondeedu_secret
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MongoDB - Audit Logs Storage
  mongodb:
    image: mongo:7-jammy
    container_name: 1edu-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ondeedu
      MONGO_INITDB_ROOT_PASSWORD: ondeedu_mongo
      MONGO_INITDB_DATABASE: audit_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - 1edu-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zipkin - Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: 1edu-zipkin
    ports:
      - "9411:9411"
    networks:
      - 1edu-network

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: 1edu-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - 1edu-network

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: 1edu-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - 1edu-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  minio_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  1edu-network:
    driver: bridge
