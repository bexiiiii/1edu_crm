# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.1edu.kz;

    # Certbot ACME challenge (must stay HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name api.1edu.kz;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/api.1edu.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.1edu.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy — allows Keycloak admin console and API calls from same origin
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # API Gateway (all /api/* traffic)
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://api_gateway;   # uses upstream keepalive pool
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";        # required for keepalive upstream

        # Retry on transient gateway errors (does not retry non-idempotent methods)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries    2;
        proxy_next_upstream_timeout  5s;

        # Longer timeout for file uploads
        proxy_read_timeout 300s;
    }

    # Keycloak token endpoint — strict rate limit (brute-force protection)
    location ~ ^/auth/realms/[^/]+/protocol/openid-connect/token$ {
        limit_req zone=token burst=10 nodelay;

        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # Keycloak static resources (no rate limit — many parallel JS chunks)
    location /auth/resources/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      8 256k;

        # Cache static assets
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Keycloak OIDC discovery endpoints contain /.well-known/ and must bypass the generic dot-path block.
    location ~ ^/auth/realms/[^/]+/\.well-known/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # Keycloak (all other /auth/* traffic)
    location /auth/ {
        limit_req zone=auth burst=50 nodelay;

        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # Grafana
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # Prometheus
    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://prometheus:9090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Zipkin
    location = /zipkin {
        return 301 /zipkin/;
    }

    location /zipkin/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://zipkin:9411;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # RabbitMQ Management
    location = /rabbitmq {
        return 301 /rabbitmq/;
    }

    location /rabbitmq/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://rabbitmq:15672;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Eureka UI
    location = /eureka {
        return 301 /eureka/;
    }

    location = /eureka/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://service-registry:8761/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        sub_filter_once off;
        sub_filter '<base href="/">' '<base href="/eureka/">';
        sub_filter 'href="/lastn"' 'href="/eureka/lastn"';
    }

    location = /eureka/lastn {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://service-registry:8761/lastn;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /eureka/ {
        auth_basic           "1edu Monitoring";
        auth_basic_user_file /etc/nginx/tenants/monitoring.htpasswd;

        proxy_pass         http://service-registry:8761;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check (for load balancer / uptime monitoring)
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
        return 404;
    }

    # Default — 404 (no frontend served here; frontend is separate)
    location / {
        return 404;
    }
}
