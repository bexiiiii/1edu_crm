# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    server_name beta.1edu.kz www.beta.1edu.kz;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name beta.1edu.kz www.beta.1edu.kz;

    # ─── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/beta.1edu.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.1edu.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security Headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── API Gateway (all /api/* traffic) ────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        set $upstream_api http://api-gateway:8090;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Keycloak static resources (no rate limit — many parallel JS chunks) ──
    location /auth/resources/ {
        set $upstream_kc http://keycloak:8080;
        proxy_pass $upstream_kc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
    }

    # ─── Keycloak ────────────────────────────────────────────
    location /auth/ {
        limit_req zone=auth burst=50 nodelay;

        set $upstream_kc http://keycloak:8080;
        proxy_pass $upstream_kc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ─── Swagger UI ──────────────────────────────────────────
    location /swagger-ui/ {
        set $upstream_swagger http://api-gateway:8090;
        proxy_pass $upstream_swagger;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check endpoint ───────────────────────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ─── Default ─────────────────────────────────────────────
    location / {
        return 404;
    }
}
