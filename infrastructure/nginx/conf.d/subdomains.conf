# Include per-tenant HTTPS configs (generated by cert-issuer)
include /etc/nginx/tenants/*.conf;

# Catch-all HTTP for *.1edu.kz — Let's Encrypt challenge + HTTPS redirect
server {
    listen 80;
    server_name ~^(?<subdomain>[^.]+)\.1edu\.kz$;

    # Let's Encrypt HTTP challenge for all subdomains
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
