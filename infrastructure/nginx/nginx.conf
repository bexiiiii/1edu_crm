worker_processes auto;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    worker_connections 4096;
}

http {
    # Basic Settings
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting
    # General API: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
    # Auth pages (Keycloak UI): 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    # Token endpoint — strict, prevents brute-force password attacks: 3 req/s per IP
    limit_req_zone $binary_remote_addr zone=token:10m rate=3r/s;
    limit_req_status 429;

    # Timeouts
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;
    keepalive_timeout      65;
    # Prevent slow-body attacks
    client_body_timeout    30s;
    client_header_timeout  15s;

    # Docker DNS Resolver
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # API Gateway upstream — keepalive pool for reuse of backend connections
    upstream api_gateway {
        server api-gateway:8090;
        keepalive 64;           # max idle keepalive connections in pool
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}
