  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8116']
        labels: { service: 'notification-service' }

  - job_name: 'file-service'
    metrics_path: '/actuator/prometheus'
