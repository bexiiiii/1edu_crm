global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: '1edu-crm'

scrape_configs:

  # ── Prometheus itself ────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Spring Boot services (Docker container names) ────────────
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8090']
        labels: { service: 'api-gateway' }

  - job_name: 'tenant-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['tenant-service:8100']
        labels: { service: 'tenant-service' }

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8101']
        labels: { service: 'auth-service' }

  - job_name: 'student-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['student-service:8102']
        labels: { service: 'student-service' }

  - job_name: 'lead-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['lead-service:8104']
        labels: { service: 'lead-service' }

  - job_name: 'course-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
